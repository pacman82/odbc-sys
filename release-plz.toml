# Map conventional commit messages to sensible defaults for changelog groups
[changelog]
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Changed" },
    { message = "^docs", group = "Changed" },
    { message = ".*", skip = true },
]
